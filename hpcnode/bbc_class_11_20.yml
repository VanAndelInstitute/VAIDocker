version: '3.1'

networks:
  extcomputenet:
    name: hpcnode_computenet
    external: true    

services:
  compute160:
    extends:
      file: compute-common-docker-compose.yml
      service: compute
    container_name: compute160
    hostname: compute160
    networks:
      extcomputenet:
        ipv4_address: 10.152.223.160
    volumes:
      - /localdisk/tmp/compute160:/tmp:rw
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 20G
          pids: -1
    memswap_limit: 20G
    shm_size: 5G

