version: '3.1'

networks:
  extcomputenet:
    name: hpcnode_computenet
    external: true

services:
  compute170:
    extends:
      file: compute-common-docker-compose.yml
      service: compute
    container_name: compute170
    hostname: compute170
    networks:
      extcomputenet:
        ipv4_address: 10.152.223.170
    volumes:
      - /localdisk/tmp/compute170:/tmp:rw
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 20G
          pids: -1
    memswap_limit: 20G
    shm_size: 5G

